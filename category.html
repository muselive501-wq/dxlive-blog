<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Category | DXLIVE FAN BLOG</title>
    <!-- Google Fonts: Noto Sans JP -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header class="navbar">
        <div class="header-container">
            <div class="logo"><a href="index.html" style="color: inherit; text-decoration: none;">DXLIVE<span>FAN
                        BLOG</span></a></div>
            <nav class="nav-links">
                <a href="index.html">Home</a>
                <a href="category.html?type=news">News</a>
                <a href="category.html?type=creators">Creators</a>
                <a href="category.html?type=events">Events</a>
                <a href="category.html?type=knowhow">ノウハウ</a>
            </nav>
        </div>
    </header>

    <main class="main-content">
        <section class="section-container">
            <h2 class="section-title"><span id="category-title">Loading...</span> <span
                    style="font-size: 1rem; color: var(--text-tertiary); margin-left:10px;" id="category-desc"></span>
            </h2>
            <div class="news-grid" id="news-container">
                <!-- Data will be loaded via JS -->
            </div>
        </section>
    </main>

    <footer>
        <div class="footer-content">
            <div class="footer-logo">DXLIVE<span>FAN BLOG</span></div>
            <p>© 2026 DXLIVE FAN BLOG. All Rights Reserved.</p>
            <div class="footer-nav" style="margin-top: 1rem;">
                <a href="about.html" style="color: var(--text-secondary); margin: 0 10px;">About / Disclaimer</a>
            </div>
        </div>
    </footer>

    <script>
        const categoryTitles = {
            'news': { title: 'News / Campaigns', desc: '最新のニュースとキャンペーン' },
            'creators': { title: 'Creators', desc: '注目の人気キャスト紹介' },
            'events': { title: 'Events', desc: '開催中の限定イベント情報' },
            'knowhow': { title: 'Experience', desc: '役立つノウハウ・ガイド' }
        };

        async function loadCategoryNews() {
            try {
                const params = new URLSearchParams(window.location.search);
                const categoryType = params.get('type') || 'news';

                const catInfo = categoryTitles[categoryType] || categoryTitles['news'];
                document.getElementById('category-title').textContent = catInfo.title;
                document.getElementById('category-desc').textContent = catInfo.desc;
                document.title = `${catInfo.title} | DXLIVE FAN BLOG`;

                const response = await fetch('news.json');
                const news = await response.json();
                const container = document.getElementById('news-container');
                container.innerHTML = '';

                const filtered = news.filter(item => item.categoryId === categoryType);

                if (filtered.length === 0) {
                    container.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 40px;">該当する記事が見つかりませんでした。</div>';
                    return;
                }

                filtered.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'news-card';
                    card.innerHTML = `
                        <div class="news-image"><img src="${item.image}" alt="${item.title}" style="width:100%; height:100%; object-fit:cover;"></div>
                        <div class="news-content">
                            <div class="news-meta">
                                <span class="news-category">${item.category}</span>
                                <time>${item.date}</time>
                            </div>
                            <h3 class="news-title">${item.title}</h3>
                            <p class="news-excerpt">${item.excerpt}</p>
                            <a href="${item.url}" class="read-more">READ MORE</a>
                        </div>
                    `;
                    container.appendChild(card);
                });
            } catch (error) {
                console.error('Error loading news:', error);
            }
        }
        loadCategoryNews();
    </script>
</body>

</html>
