<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DXLIVE FAN BLOG | デラックスライブ非公式攻略・情報サイト</title>
    <!-- Google Fonts: Noto Sans JP -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header class="navbar">
        <div class="header-container">
            <a href="index.html" class="logo">DXLIVE<span>FAN BLOG</span></a>
            <button class="hamburger" id="hamburger-btn"
                aria-label="メニュー"><span></span><span></span><span></span></button>
            <nav class="nav-links">
                <a href="index.html">Home</a>
                <a href="registration-guide.html">登録方法</a>
                <a href="category.html?type=usage">使い方</a>
                <a href="category.html?type=events">イベント情報</a>
                <a href="category.html?type=creators">キャスト向け記事</a>

                <div class="search-container">
                    <form action="search.html" method="get">
                        <input type="text" name="q" placeholder="記事を検索..." class="search-input" required>
                        <button type="submit" class="search-btn">🔍</button>
                    </form>
                </div>
            </nav>
        </div>
    </header>
    <div class="mobile-overlay" id="mobile-overlay"></div>

    <main class="main-content">
        <section class="section-container">
            <h2 class="section-title">All Articles <span>すべての記事</span></h2>
            <div class="news-grid" id="news-container">
                <!-- Data will be loaded via JS -->
            </div>
        </section>
    </main>

    <footer>
        <div class="footer-content">
            <a href="index.html" class="footer-logo">DXLIVE<span>FAN BLOG</span></a>
            <p>© 2026 DXLIVE FAN BLOG. All Rights Reserved.</p>
            <div class="footer-nav" style="margin-top: 1rem;">
                <a href="about.html" style="color: var(--text-secondary); margin: 0 10px;">About / Disclaimer</a>
            </div>
        </div>
    </footer>

    <script>
        async function loadNews() {
            try {
                const response = await fetch('news.json');
                const news = await response.json();
                const container = document.getElementById('news-container');
                container.innerHTML = '';

                // Show all items on home
                news.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'news-card';
                    card.innerHTML = `
                        <div class="news-image"><img src="${item.image}" alt="${item.title}"></div>
                        <div class="news-content">
                            <div class="news-meta">
                                <span class="news-category">${item.category}</span>
                                <time>${item.date}</time>
                            </div>
                            <h3 class="news-title">${item.title}</h3>
                            <p class="news-excerpt">${item.excerpt}</p>
                            <a href="${item.url}" class="read-more">READ MORE</a>
                        </div>
                    `;
                    card.addEventListener('click', function (e) { if (e.target.tagName !== 'A') window.location.href = item.url; });
                    container.appendChild(card);
                });
            } catch (error) {
                console.error('Error loading news:', error);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadNews();
        });
    </script>
    <script>(function () { var h = document.getElementById("hamburger-btn"), n = document.querySelector(".nav-links"), o = document.getElementById("mobile-overlay"); if (!h || !n || !o) return; function t() { h.classList.toggle("active"); n.classList.toggle("open"); o.classList.toggle("active") } h.addEventListener("click", t); o.addEventListener("click", t); n.querySelectorAll("a").forEach(function (l) { l.addEventListener("click", function () { if (n.classList.contains("open")) t() }) }) })();</script>
</body>

</html>
