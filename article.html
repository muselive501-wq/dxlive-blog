<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading... | DXLIVE FAN BLOG</title>
    <!-- Google Fonts: Noto Sans JP -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header class="navbar">
        <div class="header-container">
            <a href="index.html" class="logo">DXLIVE<span>FAN BLOG</span></a>
                        <button class="hamburger" id="hamburger-btn" aria-label="メニュー"><span></span><span></span><span></span></button>
            <nav class="nav-links">
                <a href="index.html">Home</a>
                <a href="category.html?type=news">News</a>
                <a href="category.html?type=creators">Creators</a>
                <a href="category.html?type=events">Events</a>
                <a href="category.html?type=knowhow">ノウハウ</a>
            
                <div class="search-container">
                    <form action="search.html" method="get">
                        <input type="text" name="q" placeholder="記事を検索..." class="search-input" required>
                        <button type="submit" class="search-btn">🔍</button>
                    </form>
                </div>
            </nav>
        </div>
    </header>
    <div class="mobile-overlay" id="mobile-overlay"></div>

    <main class="main-content">
        <section class="section-container">
            <div class="breadcrumb" style="margin-bottom: 2rem;">
                <a href="index.html">Home</a> > <span id="category-path">News</span>
            </div>

            <h1 id="article-title" style="margin-bottom: 1rem;">Loading...</h1>
            <div class="article-meta" style="margin-bottom: 2rem; color: var(--text-secondary);">
                <time id="article-date">Loading...</time> | <span id="article-category">Loading...</span>
            </div>

            <div class="article-body" id="article-text">
                <!-- Data will be loaded via JS -->
                読み込み中...
            </div>
        
            <div class="related-articles-container">
                <h3>関連記事</h3>
                <div id="related-articles-grid" class="article-grid"></div>
            </div>
        </section>
    </main>

    <footer>
        <div class="footer-content">
            <a href="index.html" class="footer-logo">DXLIVE<span>FAN BLOG</span></a>
            <p>© 2026 DXLIVE FAN BLOG. All Rights Reserved.</p>
            <div class="footer-nav" style="margin-top: 1rem;">
                <a href="about.html" style="color: var(--text-secondary); margin: 0 10px;">About / Disclaimer</a>
            </div>
        </div>
    </footer>

    <script>
        async function loadArticle() {
            try {
                const params = new URLSearchParams(window.location.search);
                const id = parseInt(params.get('id'));

                const response = await fetch('news.json');
                const news = await response.json();

                const article = news.find(item => item.id === id);

                if (!article) {
                    document.getElementById('article-text').innerHTML = '記事が見つかりませんでした。';
                    return;
                }

                document.getElementById('article-title').textContent = article.title;
                document.getElementById('article-date').textContent = article.date;
                document.getElementById('article-category').textContent = article.category;
                document.getElementById('category-path').textContent = article.category;
                document.getElementById('article-text').innerHTML = article.content || article.excerpt;

                document.title = `${article.title} | DXLIVE FAN BLOG`;

            } catch (error) {
                console.error('Error loading article:', error);
            }
        }
        loadArticle();
    </script>
    <script>(function(){var h=document.getElementById("hamburger-btn"),n=document.querySelector(".nav-links"),o=document.getElementById("mobile-overlay");if(!h||!n||!o)return;function t(){h.classList.toggle("active");n.classList.toggle("open");o.classList.toggle("active")}h.addEventListener("click",t);o.addEventListener("click",t);n.querySelectorAll("a").forEach(function(l){l.addEventListener("click",function(){if(n.classList.contains("open"))t()})})})();</script>
    <script src="seo_features.js"></script>
</body>

</html>
