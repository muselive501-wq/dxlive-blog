<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading... | DXLIVE FAN BLOG</title>
    <!-- Google Fonts: Noto Sans JP -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .article-hero {
            position: relative;
            height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
            margin-bottom: 3rem;
            background-color: var(--card-bg);
            border-bottom: 2px solid var(--accent-color);
        }

        .hero-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.3;
            z-index: 1;
        }

        .hero-content {
            position: relative;
            z-index: 2;
        }

        .article-hero h1 {
            font-size: 3rem;
            font-weight: 900;
            margin-bottom: 1rem;
            text-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
        }

        .article-body {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 2rem 5rem;
        }

        .article-content {
            background-color: var(--card-bg);
            border-radius: 20px;
            padding: 4rem;
            border: 1px solid var(--card-border);
            line-height: 2;
            font-size: 1.15rem;
        }

        .article-content h2 {
            font-size: 2rem;
            color: var(--accent-color);
            margin: 4rem 0 2rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid var(--card-border);
        }

        .article-content p {
            margin-bottom: 2rem;
        }

        .article-meta {
            margin-top: 1rem;
            color: var(--text-tertiary);
            font-size: 1rem;
        }

        .category-badge-static {
            display: inline-block;
            background: var(--gradient-primary);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: bold;
            margin-bottom: 15px;
        }
    </style>
</head>

<body>
    <header class="navbar">
        <div class="header-container">
            <div class="logo">DXLIVE<span>FAN BLOG</span></div>
            <nav class="nav-links">
                <a href="index.html">Home</a>
                <a href="category.html?type=news">News</a>
                <a href="category.html?type=creators">Creators</a>
                <a href="category.html?type=events">Events</a>
                <a href="category.html?type=knowhow">ノウハウ</a>
            </nav>
        </div>
    </header>

    <main class="main-content">
        <section class="article-hero" id="article-hero">
            <img src="" alt="" class="hero-bg" id="hero-img">
            <div class="hero-content">
                <span class="category-badge-static" id="category-badge">Loading...</span>
                <h1 id="article-title">Loading...</h1>
                <div class="article-meta">
                    <time id="article-date">Loading...</time> | <span id="article-category">Loading...</span>
                </div>
            </div>
        </section>

        <section class="article-body">
            <div class="article-content" id="article-text">
                <!-- Data will be loaded via JS -->
                読み込み中...
            </div>
        </section>
    </main>

    <footer>
        <div class="footer-content">
            <div class="footer-logo">DXLIVE<span>FAN BLOG</span></div>
            <p>© 2026 DXLIVE FAN BLOG. All Rights Reserved.</p>
            <div class="footer-nav" style="margin-top: 1rem;">
                <a href="about.html" style="color: var(--text-secondary); margin: 0 10px;">About / Disclaimer</a>
            </div>
        </div>
    </footer>

    <script>
        async function loadArticle() {
            try {
                const params = new URLSearchParams(window.location.search);
                const id = parseInt(params.get('id'));

                const response = await fetch('news.json');
                const news = await response.json();

                const article = news.find(item => item.id === id);

                if (!article) {
                    document.getElementById('article-text').innerHTML = '記事が見つかりませんでした。';
                    return;
                }

                document.getElementById('article-title').textContent = article.title;
                document.getElementById('article-date').textContent = article.date;
                document.getElementById('article-category').textContent = article.category;
                document.getElementById('category-badge').textContent = article.category;
                document.getElementById('hero-img').src = article.image;
                document.getElementById('article-text').innerHTML = article.content || article.excerpt;

                document.title = `${article.title} | DXLIVE FAN BLOG`;

            } catch (error) {
                console.error('Error loading article:', error);
            }
        }
        loadArticle();
    </script>
</body>

</html>
